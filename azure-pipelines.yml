# GITHUB: 'name: CI Pipeline' 
# AZURE: This is handled in the Pipeline UI, but you can use 'name:' for the build numbering format.
name: $(TeamProject)_$(Build.DefinitionName)_$(Date:yyyyMMdd)$(Rev:.r)

# GITHUB: 'on: push: branches: [ main ]'
# AZURE: 'trigger:'
trigger:
- ft/pipeline
- main

# GITHUB: 'runs-on: ubuntu-latest'
# AZURE: 'pool:'
pool:
  # vmImage: 'ubuntu-latest'
  name: 'Default'

steps:
# GITHUB: 'uses: actions/setup-java@v4'
# AZURE: 'task: JavaToolInstaller@0'
- task: JavaToolInstaller@0
  inputs:
    versionSpec: '17'
    jdkArchitectureOption: 'x64'
    jdkSourceOption: 'PreInstalled'
  displayName: 'Step 1: Set up JDK 17'

# GITHUB: 'run: mvn install -DskipTests'
# AZURE: 'script:' (or 'task: Maven@4')
- script: mvn install -DskipTests
  displayName: 'Step 2: Install Dependencies & Build'

# GITHUB: 'run: mvn exec:java ... install --with-deps chromium'
# AZURE: 'script:' (Plain command line works the same in both!)
- script: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install --with-deps chromium"
  displayName: 'Step 3: Install Playwright Browsers'

# GITHUB: 'run: mvn test'
# AZURE: 'task: Maven@4' (We use a Task here because it creates better reports than a simple 'script')
- task: Maven@4
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'test'
    publishJUnitResults: true           # This replaces the need for a separate "Upload Results" action
    testResultsFiles: '**/surefire-reports/TEST-*.xml'
  displayName: 'Step 4: Run Automated BDD Tests'

# GITHUB: 'uses: actions/upload-artifact@v4'
# AZURE: 'task: PublishBuildArtifacts@1'
- task: PublishBuildArtifacts@1
  # GITHUB: 'if: always()'
  # AZURE: 'condition: always()'
  condition: always()
  inputs:
    PathtoPublish: '$(System.DefaultWorkingDirectory)/target'
    ArtifactName: 'playwright-screenshots'
    publishLocation: 'Container'
  displayName: 'Step 5: Upload Screenshots'