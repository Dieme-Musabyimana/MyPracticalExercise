# trigger:
# - ft/pipeline
# - main

# # GITHUB: 'runs-on: ubuntu-latest'
# # AZURE: 'pool:'
# pool:
#   # vmImage: 'ubuntu-latest'
#   name: 'Default'

# steps:
# # GITHUB: 'uses: actions/setup-java@v4'
# # AZURE: 'task: JavaToolInstaller@0'
# - task: JavaToolInstaller@0
#   inputs:
#     versionSpec: '17'
#     jdkArchitectureOption: 'x64'
#     jdkSourceOption: 'PreInstalled'
#   displayName: 'Step 1: Set up JDK 17'

# # GITHUB: 'run: mvn install -DskipTests'
# # AZURE: 'script:' (or 'task: Maven@4')
# - script: mvn install -DskipTests
#   displayName: 'Step 2: Install Dependencies & Build'

# # GITHUB: 'run: mvn exec:java ... install --with-deps chromium'
# # AZURE: 'script:' (Plain command line works the same in both!)
# - script: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install --with-deps chromium"
#   displayName: 'Step 3: Install Playwright Browsers'

# # GITHUB: 'run: mvn test'
trigger:
- ft/pipeline
- main

pool:
  name: 'Default' # Uses your MBOKANI agent

steps:
# REMOVED JavaToolInstaller because you already have JDK 25 working locally!

- script: mvn install -DskipTests
  displayName: 'Step 2: Install Dependencies & Build'
  env:
    # This forces the script to see your Java 25
    JAVA_HOME: C:\Program Files\Java\jdk-25
    M2_HOME: C:\Users\USER\Downloads\apache-maven-3.9.12-bin\apache-maven-3.9.12

- script: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install --with-deps chromium"
  displayName: 'Step 3: Install Playwright Browsers'

- task: Maven@4
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'test'
    publishJUnitResults: true
    testResultsFiles: '**/surefire-reports/TEST-*.xml'
  displayName: 'Step 4: Run Automated BDD Tests'

- task: PublishBuildArtifacts@1
  condition: always()
  inputs:
    # Using 'target' directly or the full path
    PathtoPublish: '$(Build.SourcesDirectory)/target'
    ArtifactName: 'playwright-screenshots'
    publishLocation: 'Container'
  displayName: 'Step 5: Upload Screenshots'

