# Updated CI Pipeline for Self-Hosted Agent (MBOKANI)
name: $(TeamProject)_$(Build.DefinitionName)_$(Date:yyyyMMdd)$(Rev:.r)

trigger:
- ft/pipeline
- main

pool:
  name: 'Default' # Targeted at your MBOKANI agent

steps:
# STEP 1: REMOVED JavaToolInstaller. 
# Your agent already has JDK 25 working. Step 1 was likely clearing your path.

- powershell: |
    # Explicitly add Maven to the session path just in case the agent service is being stubborn
    $env:PATH += ";C:\Users\USER\Downloads\apache-maven-3.9.12-bin\apache-maven-3.9.12\bin"
    mvn install -DskipTests
  displayName: 'Step 2: Install Dependencies & Build (PowerShell Force)'

- powershell: |
    $env:PATH += ";C:\Users\USER\Downloads\apache-maven-3.9.12-bin\apache-maven-3.9.12\bin"
    mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install --with-deps chromium"
  displayName: 'Step 3: Install Playwright Browsers'

- task: Maven@4
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'test'
    publishJUnitResults: true
    testResultsFiles: '**/surefire-reports/TEST-*.xml'
    # We tell the Maven task exactly where your Java is to avoid "Not Found" errors
    javaHomeOption: 'JDKVersion'
    jdkVersionOption: 'default' 
  displayName: 'Step 4: Run Automated BDD Tests'

- task: PublishBuildArtifacts@1
  condition: always()
  inputs:
    # Changed to a more reliable variable for self-hosted agents
    PathtoPublish: '$(Build.SourcesDirectory)/target'
    ArtifactName: 'playwright-screenshots'
    publishLocation: 'Container'
  displayName: 'Step 5: Upload Screenshots'