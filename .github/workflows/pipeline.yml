name: CI Pipeline

on:
  push:
    branches: [ ft/pipeline ]
  pull_request:
    branches: [ ft/pipeline ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Dependencies and Build
        run: mvn install -DskipTests

      - name: Install Playwright Browsers and Deps
        run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install --with-deps chromium"

      - name: Run automated tests
        run: mvn test

      # NEW: This saves the screenshots so you can download them from the GitHub Actions tab
      - name: Upload Test Screenshots
        if: always() # Runs even if the tests fail!
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: target/*.png


