name: CI Pipeline

on:
  push:
    branches: [ ft/pipeline ]
  pull_request:
    branches: [ ft/pipeline ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Dependencies and Build
        run: mvn install -DskipTests

      # This is the "Magic Step" that was failing/redundant
      # We use the Maven Exec plugin to ensure Playwright and its system deps are installed
      - name: Install Playwright Browsers and Deps
        run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install --with-deps chromium"

      - name: Run automated tests
        run: mvn test